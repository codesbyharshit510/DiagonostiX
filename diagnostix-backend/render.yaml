services:
  - type: web
    name: diagnostix-backend
    env: python
    runtime: python
    pythonVersion: "3.11.0"
    rootDir: diagnostix-backend
    buildCommand: sudo apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
